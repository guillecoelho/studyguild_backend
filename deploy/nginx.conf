upstream django {
    server web:8000;
    keepalive 32;
}

# Use Docker's embedded DNS resolver so upstream is re-resolved after web starts
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP — redirect to HTTPS when certs present; serve plain otherwise.
server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

